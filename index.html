<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="CHALO — Find shared auto-rickshaws near you in real-time. Track routes, see fares, and ride smart in Ahmedabad." />
  <meta name="theme-color" content="#22A147" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>CHALO — Shared Auto Finder</title>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      alert("App Error: " + msg + "\nLine: " + lineNo + "\nFile: " + url);
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      alert("Promise Error: " + event.reason);
    });
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

  <div id="app"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
